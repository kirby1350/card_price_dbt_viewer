name: card_price
version: "1.0.0"
config-version: 2

profile: card_price

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  card_price:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  card_price:
    +schema: seeds
    rarity_alias_map:
      +column_types:
        tcg: varchar
        shop: varchar
        shop_rarity_raw: varchar
        canonical_rarity_code: varchar
        canonical_rarity_name: varchar
        notes: varchar
